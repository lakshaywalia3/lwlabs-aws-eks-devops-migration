        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }

        .login-box input:focus { border-color: #00529b; outline: none; }

        /* HEADER */
        header { 
            height: 70px; background: #00529b; color: white; display: flex; 
            align-items: center; justify-content: space-between; padding: 0 25px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 50;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        h1 { font-size: 20px; font-weight: 800; margin: 0; letter-spacing: 1px; color: #fff; }

        /* MAIN LAYOUT */
        main { display: flex; flex: 1; overflow: hidden; }
        
        /* CANVAS AREA */
        .canvas-area { flex: 1; background: #cbd5e1; display: flex; justify-content: center; align-items: center; padding: 20px; overflow: auto; }
        canvas { box-shadow: 0 10px 25px rgba(0,0,0,0.3); background: white; max-width: 100%; height: auto; border-radius: 8px; transition: 0.3s; }

        /* SIDEBAR */
        .sidebar { width: 400px; background: white; border-left: 1px solid #ddd; overflow-y: auto; display: flex; flex-direction: column; flex-shrink: 0; }
        .section { padding: 15px; border-bottom: 1px solid #eee; }
        .section-title { font-weight: bold; color: #00529b; margin-bottom: 10px; display: block; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        
        /* INPUTS & CHECKBOXES */
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .col { flex: 1; }
        .lbl-check { display: flex; align-items: center; justify-content: space-between; font-size: 11px; font-weight: bold; color: #64748b; margin-bottom: 4px; cursor: pointer; }
        .lbl-check input[type="checkbox"] { width: auto; margin: 0; cursor: pointer; accent-color: #00529b; }
        input[type="text"], select, textarea { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; font-size: 13px; text-transform: uppercase; font-weight: bold; }
        input[type="text"]:focus, select:focus, textarea:focus { border-color: #00529b; outline: none; }
        
        .quick-fill { background: #eff6ff; border: 1px solid #bfdbfe; color: #00529b; font-weight: bold; cursor: pointer; }

        /* BUTTONS */
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 8px; font-size: 13px; transition: 0.2s; }
        .btn-primary { background: #00529b; color: white; }
        .btn-primary:hover { background: #003d73; }
        .btn-secondary { background: #f1f5f9; color: #334155; border: 1px solid #cbd5e1; }
        .btn-secondary:hover { background: #e2e8f0; }
        .btn-danger { background: #fee2e2; color: #991b1b; }

        /* CROPPER */
        #cropModal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 100; display: none; align-items: center; justify-content: center; }
        .crop-box { background: white; padding: 20px; border-radius: 8px; max-width: 90%; }
        #cropImg { max-width: 100%; max-height: 500px; }

        function wrapText(context, text, x, y, maxWidth, lineHeight) {
            const words = text.split(' ');
            let line = '';
            for(let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                let metrics = context.measureText(testLine);
                if (metrics.width > maxWidth && n > 0) {
                    context.fillText(line, x, y);
                    line = words[n] + ' ';
                    y += lineHeight;
                } else { line = testLine; }
            }
            context.fillText(line, x, y);
        }

        // Print Function (Fixed to handle popups better)
        function printCard() {
            const dataUrl = document.getElementById('cvs').toDataURL('image/png', 1.0);
            const isA4 = els.format.value === 'a4';
            const printWindow = window.open('', '_blank');
            
            if (!printWindow) {
                alert("⚠️ Your browser blocked the print window. Please 'Allow Pop-ups' for this site to print.");
                return;
            }
            
            const cssOrientation = isA4 ? 'portrait' : 'landscape';
            const cssSizing = isA4 ? 'max-width: 100%; height: 98vh;' : 'width: 100%; max-width: 1000px;';

            printWindow.document.write(`
                <html>
                    <head>
                        <title>Print THE LW LABS Report</title>
                        <style>
                            body { margin: 0; display: flex; justify-content: center; align-items: center; background: #fff; padding: 20px; }
                            @media print {
                                @page { size: ${cssOrientation}; margin: 0; }
                                body { padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                            }
                            img { ${cssSizing} object-fit: contain; }
                        </style>
                    </head>
                    <body>
                        <img src="${dataUrl}" onload="setTimeout(() => { window.print(); window.close(); }, 500);" />
                    </body>
                </html>
            `);
            printWindow.document.close();
        }

        // --- UPLOAD TO PHP BACKEND ---
        async function upload(){
            const btn = document.querySelector('.btn-primary');
            btn.innerHTML = "Saving..."; btn.disabled=true;
            
            let gem64=""; 
            if(assets.gemOk){ const c=document.createElement('canvas'); c.width=assets.gem.width; c.height=assets.gem.height; c.getContext('2d').drawImage(assets.gem,0,0); gem64=c.toDataURL(); }
            
            const payload = {
                reportNo: els.report.value, weight: els.weight.value,
                species: els.species.value, variety: els.variety.value,
                cut: els.cut.value, dimensions: els.dim.value,
                color: els.color.value, microscopic: els.comm.value,
                gemImage: gem64,
                reportImage: document.getElementById('cvs').toDataURL('image/jpeg', 0.95)
            };

            try {
                const req = await fetch('/save_report.php', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
                const rawResponse = await req.text(); 
                
                try {
                    const res = JSON.parse(rawResponse);
                    if(res.status === 'success') alert("✅ Uploaded Successfully!");
                    else alert("Server Error: " + res.message);
                } catch (jsonErr) { alert("Server returned an error. First 100 characters:\n\n" + rawResponse.substring(0, 100)); }
            } catch(e) { alert("Error uploading: " + e.message); }
            btn.innerHTML = "⬆ Upload to Database"; btn.disabled=false;
        }
